services:
  # 1台目：データベース
  db:
    image: postgres:15-alpine
    container_name: todo-db
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER is not set in .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is not set in .env}
      POSTGRES_DB: ${DB_NAME:?DB_NAME is not set in .env}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - todo-gate

  # 2台目：Pythonアプリ
  web:
    build: .
    image: todo-web:latest
    container_name: todo-web
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:?DB_USER is not set in .env}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is not set in .env}
      - DB_NAME=${DB_NAME:?DB_NAME is not set in .env}
    command: uvicorn app.main:app --host 0.0.0.0 --reload
    depends_on:
      db:
        condition: service_healthy
    networks:
      - todo-gate

networks:
  todo-gate:
    name: todo-gate

volumes:
  db_data:
